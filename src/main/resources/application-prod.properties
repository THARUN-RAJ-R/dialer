# ─── Production Profile (H2 File-based) ──────────────────────────────────────
# Render provides the PORT environment variable
server.port=${PORT:8080}

# Use file-based H2. On Render, /opt/render/project/src/data is a good place if using Disks,
# but for now we'll just use the local directory.
spring.datasource.url=jdbc:h2:file:./data/dialerdb;DB_CLOSE_DELAY=-1;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
